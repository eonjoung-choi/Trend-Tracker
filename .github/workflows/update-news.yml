name: 📰 뉴스 자동 업데이트

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: pip install -r requirements.txt

      - name: 🔄 뉴스 수집 및 업데이트
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_news.py

      - name: 📤 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news_data.json
          git diff --cached --quiet || git commit -m "📰 뉴스 자동 업데이트 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
